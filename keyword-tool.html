  <script>
    const searchBtn = document.getElementById('searchBtn');
    const keywordInput = document.getElementById('keywordInput');
    const loader = document.getElementById('loader');
    const progressText = document.getElementById('progressText');
    const resultsContainer = document.getElementById('resultsContainer');
    const totalCount = document.getElementById('totalCount');
    const visibleCount = document.getElementById('visibleCount');
    const keywordList = document.getElementById('keywordList');
    const rawTextarea = document.getElementById('rawTextarea');
    
    const filterInput = document.getElementById('filterInput');
    const tabsGroup = document.getElementById('tabsGroup');
    const sortOrder = document.getElementById('sortOrder');
    const searchEngine = document.getElementById('searchEngine');
    
    const copyAllBtn = document.getElementById('copyAllBtn');
    const downloadCsvBtn = document.getElementById('downloadCsvBtn');
    const downloadTxtBtn = document.getElementById('downloadTxtBtn');

    let allKeywords = []; // キーワードオブジェクト { text, type, score, count, stars }
    let activeTab = 'all';

    // JSONPサジェスト取得
    function fetchSuggest(query, engine) {
      return new Promise((resolve) => {
        const callbackName = 'jsonp_' + Math.round(100000 * Math.random());
        window[callbackName] = function(data) {
          delete window[callbackName];
          document.body.removeChild(script);
          
          if (data && data[1]) {
            resolve(data[1]);
          } else {
            resolve([]);
          }
        };

        const script = document.createElement('script');
        const client = (engine === 'youtube') ? 'youtube' : 'firefox';
        script.src = `https://suggestqueries.google.com/complete/search?client=${client}&hl=ja&gl=jp&jsonp=${callbackName}&q=${encodeURIComponent(query)}`;
        document.body.appendChild(script);
      });
    }

    // クエリ一覧生成
    function generateQueries(baseKeyword) {
      const queries = [{ text: baseKeyword, type: 'main' }];

      if (document.getElementById('optHiragana').checked) {
        const hiraganas = 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん';
        for (let char of hiraganas) {
          queries.push({ text: `${baseKeyword} ${char}`, type: 'hiragana' });
        }
      }

      if (document.getElementById('optAlphabet').checked) {
        const alphabets = 'abcdefghijklmnopqrstuvwxyz';
        for (let char of alphabets) {
          queries.push({ text: `${baseKeyword} ${char}`, type: 'alphabet' });
        }
      }

      if (document.getElementById('optNumbers').checked) {
        const numbers = '0123456789';
        for (let char of numbers) {
          queries.push({ text: `${baseKeyword} ${char}`, type: 'number' });
        }
      }

      return queries;
    }

    // 検索処理
    searchBtn.addEventListener('click', async () => {
      const baseKeyword = keywordInput.value.trim();
      if (!baseKeyword) {
        alert('キーワードを入力してください。');
        return;
      }

      resultsContainer.style.display = 'none';
      loader.style.display = 'block';
      keywordList.innerHTML = '';
      rawTextarea.value = '';
      filterInput.value = '';
      allKeywords = [];
      
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector('[data-tab="all"]').classList.add('active');
      activeTab = 'all';

      const queries = generateQueries(baseKeyword);
      const uniqueKeywords = {}; // スコア集計用連想配列
      const engine = searchEngine.value;
      let completed = 0;

      const batchSize = 6;
      for (let i = 0; i < queries.length; i += batchSize) {
        const batch = queries.slice(i, i + batchSize);
        const promises = batch.map(async (qObj) => {
          const results = await fetchSuggest(qObj.text, engine);
          
          results.forEach((kw, index) => {
            let cleanKw = '';
            if (Array.isArray(kw)) {
              cleanKw = kw[0];
            } else if (typeof kw === 'string') {
              cleanKw = kw;
            }

            if (cleanKw) {
              // 関連度スコア計算: 順位が上（インデックス0）ほど高い基礎点(10〜1点)
              const points = Math.max(1, 10 - index);

              if (!uniqueKeywords[cleanKw]) {
                uniqueKeywords[cleanKw] = {
                  text: cleanKw,
                  type: qObj.type,
                  score: points,
                  count: 1
                };
              } else {
                uniqueKeywords[cleanKw].score += points;
                uniqueKeywords[cleanKw].count += 1;
                // 重複時はメインカテゴリ優先
                if (qObj.type === 'main') {
                  uniqueKeywords[cleanKw].type = 'main';
                }
              }
            }
          });
          completed++;
        });

        await Promise.all(promises);
        progressText.innerText = `サジェストワードを解析中... (${completed} / ${queries.length})`;
      }

      // 相対的なスコアをもとに星の数を算出
      const rawList = Object.values(uniqueKeywords);
      if (rawList.length > 0) {
        const maxScore = Math.max(...rawList.map(k => k.score), 1);
        
        allKeywords = rawList.map(k => {
          const ratio = k.score / maxScore;
          let stars = 1;
          if (ratio > 0.8) stars = 5;
          else if (ratio > 0.5) stars = 4;
          else if (ratio > 0.25) stars = 3;
          else if (ratio > 0.1) stars = 2;
          
          return {
            ...k,
            stars: stars
          };
        });
      }

      loader.style.display = 'none';
      resultsContainer.style.display = 'block';
      totalCount.innerText = allKeywords.length;

      renderResults();
    });

    // 描画とソート
    function renderResults() {
      keywordList.innerHTML = '';
      const filterText = filterInput.value.trim().toLowerCase();
      const order = sortOrder.value;
      
      let filtered = [...allKeywords];

      // 1. タブで絞り込み
      if (activeTab !== 'all') {
        filtered = filtered.filter(item => item.type === activeTab);
      }

      // 2. 検索文字で絞り込み (除外対応)
      if (filterText) {
        if (filterText.startsWith('-') && filterText.length > 1) {
          const excludeTerm = filterText.substring(1);
          filtered = filtered.filter(item => !item.text.toLowerCase().includes(excludeTerm));
        } else {
          filtered = filtered.filter(item => item.text.toLowerCase().includes(filterText));
        }
      }

      // 3. ソート順
      if (order === 'score') {
        filtered.sort((a, b) => b.score - a.score);
      } else {
        filtered.sort((a, b) => a.text.localeCompare(b.text, 'ja'));
      }

      visibleCount.innerText = filtered.length;

      const textArray = [];
      filtered.forEach((item, index) => {
        textArray.push(item.text);

        const li = document.createElement('li');
        li.className = 'keyword-item';

        // 左側（ランキング、キーワード名、星、タグ）
        const leftSide = document.createElement('div');
        leftSide.className = 'keyword-left-side';

        const rankNum = document.createElement('span');
        rankNum.className = 'keyword-rank-num';
        rankNum.textContent = (order === 'score') ? `${index + 1}` : '';

        const textSpan = document.createElement('span');
        textSpan.textContent = item.text;

        const starsSpan = document.createElement('span');
        starsSpan.className = 'stars-indicator';
        starsSpan.textContent = '★'.repeat(item.stars) + '☆'.repeat(5 - item.stars);

        const badge = document.createElement('span');
        badge.className = 'keyword-badge';
        badge.textContent = getTypeLabel(item.type);

        leftSide.appendChild(rankNum);
        leftSide.appendChild(textSpan);
        leftSide.appendChild(starsSpan);
        leftSide.appendChild(badge);

        // 右側アクション（トレンド、コピー）
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'item-actions';

        const trendLink = document.createElement('a');
        trendLink.className = 'trend-link';
        trendLink.href = `https://trends.google.co.jp/trends/explore?geo=JP&q=${encodeURIComponent(item.text)}`;
        trendLink.target = '_blank';
        trendLink.title = 'Googleトレンドで検索数推移を比較';
        trendLink.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>`;

        const copySpan = document.createElement('span');
        copySpan.className = 'copy-icon';
        copySpan.textContent = '📋';
        copySpan.title = 'コピー';
        copySpan.addEventListener('click', () => {
          copySingle(item.text);
        });

        actionsDiv.appendChild(trendLink);
        actionsDiv.appendChild(copySpan);

        li.appendChild(leftSide);
        li.appendChild(actionsDiv);
        keywordList.appendChild(li);
      });

      rawTextarea.value = textArray.join('\n');
    }

    function getTypeLabel(type) {
      switch (type) {
        case 'main': return 'メイン';
        case 'hiragana': return 'ひらがな';
        case 'alphabet': return 'アルファベット';
        case 'number': return '数字';
        default: return '';
      }
    }

    // 各種変更イベントリスナー
    filterInput.addEventListener('input', renderResults);
    sortOrder.addEventListener('change', renderResults);

    tabsGroup.addEventListener('click', (e) => {
      if (e.target.classList.contains('tab-btn')) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        activeTab = e.target.getAttribute('data-tab');
        renderResults();
      }
    });

    // コピー
    function copySingle(text) {
      navigator.clipboard.writeText(text).then(() => {
        const alertBox = document.createElement('div');
        alertBox.style.position = 'fixed';
        alertBox.style.bottom = '24px';
        alertBox.style.right = '24px';
        alertBox.style.background = 'var(--primary-color)';
        alertBox.style.color = 'white';
        alertBox.style.padding = '10px 20px';
        alertBox.style.borderRadius = '8px';
        alertBox.style.boxShadow = 'var(--shadow-md)';
        alertBox.style.zIndex = '1000';
        alertBox.innerText = `コピー完了: ${text}`;
        document.body.appendChild(alertBox);
        setTimeout(() => document.body.removeChild(alertBox), 1500);
      });
    }

    // すべてコピー
    copyAllBtn.addEventListener('click', () => {
      if (!rawTextarea.value) return;
      rawTextarea.select();
      navigator.clipboard.writeText(rawTextarea.value).then(() => {
        alert('表示中の関連キーワードをすべてコピーしました！');
      });
    });

    // CSVダウンロード
    downloadCsvBtn.addEventListener('click', () => {
      const text = rawTextarea.value;
      if (!text) return;
      const lines = text.split('\n');
      
      let csvContent = "\uFEFF"; // BOM
      csvContent += "順位,キーワード,推定人気度,カテゴリ\n";
      
      lines.forEach((line, index) => {
        const item = allKeywords.find(k => k.text === line);
        const typeLabel = item ? getTypeLabel(item.type) : '';
        const starsNum = item ? item.stars : 1;
        csvContent += `"${index + 1}","${line.replace(/"/g, '""')}","★${starsNum}","${typeLabel}"\n`;
      });

      downloadFile(csvContent, `keywords_ranking_${keywordInput.value.trim()}.csv`, 'text/csv');
    });

    // TXTダウンロード
    downloadTxtBtn.addEventListener('click', () => {
      const text = rawTextarea.value;
      if (!text) return;
      downloadFile(text, `keywords_${keywordInput.value.trim()}.txt`, 'text/plain');
    });

    function downloadFile(content, fileName, contentType) {
      const blob = new Blob([content], { type: `${contentType};charset=utf-8;` });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", fileName);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    keywordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchBtn.click();
      }
    });
  </script>
</body>
</html>
