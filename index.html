<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トレリンク で開く</title>
</head>
<body style="background:#0a0a0e; color:#fff; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; padding:20px; box-sizing:border-box;">
  <div style="text-align:center; max-width:400px; background:rgba(255, 255, 255, 0.03); border:1px solid rgba(255, 255, 255, 0.08); border-radius:24px; padding:40px 30px; box-shadow:0 20px 40px rgba(0,0,0,0.6); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);">
    <!-- Pulse icon -->
    <div style="width:72px; height:72px; background:linear-gradient(135deg, #00ddff, #0077ff); border-radius:22px; margin:0 auto 24px auto; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(0, 221, 255, 0.35);">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 9h3v10H4zm13 0h3v10h-3zm-6-3h2v14h-2zm-3 5h8v2H8z" fill="#ffffff" style="fill:#ffffff; stroke:#ffffff; stroke-width:0.5;"/>
      </svg>
    </div>
    <h2 style="margin:0 0 12px 0; font-size:22px; font-weight:700; background:linear-gradient(90deg, #00ddff, #00ffe0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-0.5px;">トレリンク を起動しています</h2>
    <p style="margin:0 0 32px 0; font-size:14px; color:#a0aec0; line-height:1.6;">
      アプリが自動的に起動しない、またはインストールされていない場合は、下のボタンを押してください。
    </p>
    <a id="btn-open-app" href="#" style="display:block; text-decoration:none; background:linear-gradient(90deg, #00ddff, #00bfff); color:#0a0a0e; font-weight:700; font-size:16px; padding:16px 24px; border-radius:14px; margin-bottom:16px; box-shadow:0 8px 20px rgba(0, 221, 255, 0.25); text-align:center;">
      アプリを起動 / ダウンロード
    </a>
  </div>

  <script>
    (function() {
      // 1. URLパラメータの取得
      function getQueryParams() {
        const params = {};
        const urlParams = new URLSearchParams(window.location.search);
        urlParams.forEach((val, key) => { params[key] = val; });
        if (window.location.hash) {
          const hashParts = window.location.hash.split('?');
          if (hashParts.length > 1) {
            const hashParams = new URLSearchParams(hashParts[1]);
            hashParams.forEach((val, key) => { params[key] = val; });
          }
        }
        return params;
      }

      // App StoreのURL
      const APP_STORE_URL = 'https://apps.apple.com/app/id6776552419';

      const params = getQueryParams();
      if (params.id) {
        let appUrl = 'gymflow://open-menu?id=' + encodeURIComponent(params.id);
        if (params.data) {
          appUrl += '&data=' + encodeURIComponent(params.data);
        }

        const btn = document.getElementById('btn-open-app');
        btn.href = appUrl;

        // アプリ起動試行
        window.location.href = appUrl;

        // タイマー判定：2.5秒経っても画面が表示されたままの場合、App Storeへリダイレクト
        const start = Date.now();
        setTimeout(function() {
          // アプリが起動してブラウザがバックグラウンドになった場合は処理を中断
          if (document.hidden || document.webkitHidden) {
            return;
          }
          // 時間計測でバックグラウンド一時停止を検知し、まだフォアグラウンドにいる場合のみ実行
          if (Date.now() - start < 3500) {
            window.location.href = APP_STORE_URL;
          }
        }, 2500);
      } else {
        // IDがない場合はApp Storeのトップに誘導
        document.getElementById('btn-open-app').href = APP_STORE_URL;
      }
    })();
  </script>
</body>
</html>
